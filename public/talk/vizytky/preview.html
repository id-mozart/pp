<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Превʼю візитки · Pan&amp;Partners</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:#d9d9d9; color:#2a2a2a; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .top{ display:flex; align-items:center; gap:14px; padding:14px 22px; background:#ececec; border-bottom:1px solid rgba(0,0,0,.10); flex-wrap:wrap; position:sticky; top:0; z-index:5; }
  .top .brand{ font-family:'Spectral',serif; font-weight:600; font-size:19px; color:#2a2a2a; }
  .top .brand span{ color:#C6791C; }
  .top .sp{ flex:1; }
  .btn{ font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.06em; color:#5a5a5a; background:#fff; border:1px solid rgba(0,0,0,.14); border-radius:8px; padding:8px 14px; cursor:pointer; text-decoration:none; transition:.15s; }
  .btn:hover{ color:#C6791C; border-color:#C6791C; }
  .btn.pri{ color:#fff; background:linear-gradient(90deg,#E2A638,#C6791C); border-color:transparent; }
  .wrap{ max-width:1240px; margin:0 auto; padding:48px 32px 100px; }
  .pair{ display:flex; flex-direction:column; gap:44px; }
  .prow{ display:flex; flex-wrap:wrap; gap:34px; align-items:flex-start; }
  .side .lab{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:#7a7a7a; margin:0 0 12px; }
  .stage{ border-radius:16px; overflow:hidden; box-shadow:0 18px 44px rgba(0,0,0,.22), 0 3px 10px rgba(0,0,0,.12); width:calc(1004px * var(--s,.5)); height:calc(650px * var(--s,.5)); }
  .scaler{ width:1004px; height:650px; transform:scale(var(--s,.5)); transform-origin:top left; }
  .card{ position:relative; width:1004px; height:650px; overflow:hidden; }
  .el{ position:absolute; }
  .empty{ color:#5a5a5a; font-size:15px; line-height:1.7; }
  .empty a{ color:#C6791C; }
  @media print{
    @page{ size:1004px 650px; margin:0; }
    html,body{ background:#fff; }
    .top{ display:none; } .wrap{ padding:0; max-width:none; }
    .pair{ display:block; } .side .lab{ display:none; }
    .stage{ box-shadow:none; border-radius:0; width:1004px; height:650px; page-break-after:always; }
    .scaler{ transform:none; }
  }
</style>
</head>
<body>
  <div class="top">
    <div class="brand">Pan<span>&amp;</span>Partners · превʼю</div>
    <div class="sp"></div>
    <a class="btn" href="/talk/vizytky/edit.html">← Конструктор</a>
    <a class="btn" href="/talk/vizytky/">Галерея</a>
    <button class="btn pri" id="print">Друк / PDF</button>
  </div>
  <div class="wrap"><div class="pair" id="pair"></div></div>

<script>
/* Read-only preview of the current constructor layout — front + dark & light backs. */
(function(){
  var KEY='pp-vizytka-constructor-v7';
  var FONTS={ serif:"'Spectral',serif", mono:"'JetBrains Mono',monospace", sans:"'Inter',sans-serif" };
  var ICONS={
    phone:'<path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233a14 14 0 0 0 6.392 6.384"/>',
    mail:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
    globe:'<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>'
  };
  function icon(k,sz,c){ return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+ICONS[k]+'</svg>'; }
  function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function elHTML(e){
    var pos='position:absolute;left:'+e.x+'px;top:'+e.y+'px;';
    if(e.type==='text'){ return '<div class="el" style="'+pos+'white-space:nowrap;font-family:'+FONTS[e.font]+';font-size:'+e.size+'px;font-weight:'+e.weight+';letter-spacing:'+e.track+'em;'+(e.upper?'text-transform:uppercase;':'')+'color:'+e.color+';text-align:'+e.align+';line-height:1.05;">'+esc(e.text)+'</div>'; }
    if(e.type==='contact'){ return '<div class="el" style="'+pos+'display:flex;align-items:center;gap:20px;white-space:nowrap;">'+icon(e.kind,Math.round(e.size*0.86),'#C6791C')+'<span style="font-family:'+FONTS.mono+';font-size:'+e.size+'px;letter-spacing:.02em;color:'+e.color+';">'+esc(e.text)+'</span></div>'; }
    if(e.type==='image'){ return '<div class="el" style="'+pos+'"><img src="'+e.src+'" style="display:block;width:'+e.w+'px;height:auto;"></div>'; }
    if(e.type==='line'){ return '<div class="el" style="'+pos+'"><div style="width:'+e.w+'px;height:'+e.h+'px;background:linear-gradient(90deg,#C6791C,rgba(198,121,28,0));"></div></div>'; }
    return '';
  }
  function cardHTML(sideData){ return '<div class="card" style="background:'+sideData.bg+';">'+sideData.els.map(elHTML).join('')+'</div>'; }
  function block(label, sideData){ return '<div class="side"><div class="lab">'+label+'</div><div class="stage"><div class="scaler">'+cardHTML(sideData)+'</div></div></div>'; }
  function defaults(){
    return {
      front:{
        bg:'linear-gradient(157deg,#F7F1E6 0%,#F1E7D4 100%)',
        els:[
          {id:'logo', type:'image', src:'/talk/vizytky/assets/pan-partners-dark.svg', x:80, y:58, w:330},
          {id:'dir',  type:'text', text:'Консалтинг · Продажі · Переговори', x:544, y:68, size:18, font:'mono', color:'#6E5A3C', weight:500, track:.12, upper:true, align:'right'},
          {id:'name', type:'text', text:'Тетяна Пан', x:75, y:198, size:96, font:'serif', color:'#2A1D10', weight:500, track:0, upper:false, align:'left'},
          {id:'roles',type:'text', text:'Бізнес-тренерка · коуч · менторка', x:80, y:312, size:22, font:'mono', color:'#A85D0F', weight:600, track:.05, upper:true, align:'left'},
          {id:'line', type:'line', x:80, y:392, w:360, h:2},
          {id:'phone',type:'contact', kind:'phone', text:'+380 50 448-14-11', x:80, y:452, size:28, color:'#2A1D10'},
          {id:'mail', type:'contact', kind:'mail',  text:'t.pan@pan-partners.agency', x:80, y:506, size:28, color:'#2A1D10'},
          {id:'site', type:'contact', kind:'globe', text:'pan-partners.agency', x:80, y:560, size:28, color:'#2A1D10'},
          {id:'qr',   type:'image', src:'/talk/vizytky/assets/qr-fancy.svg', x:742, y:392, w:206}
        ]
      },
      backSel:'obsidian',
      backs:{
        obsidian:{ bg:'radial-gradient(135% 150% at 50% 38%, #33240F 0%, #26190C 58%, #1C130B 100%)', els:[
          {id:'amp', type:'image', src:'/talk/vizytky/assets/amp-amber.svg', x:392, y:210, w:260}
        ]},
        cream:{ bg:'linear-gradient(157deg,#F7F1E6 0%,#F1E7D4 100%)', els:[
          {id:'amp', type:'image', src:'/talk/vizytky/assets/amp-amber.svg', x:392, y:210, w:260}
        ]},
        amber:{ bg:'linear-gradient(152deg,#F0D08A 0%,#EFBE6A 26%,#E2A638 60%,#C6791C 100%)', els:[
          {id:'amp', type:'image', src:'/talk/vizytky/assets/amp-ink.svg', x:392, y:210, w:260}
        ]}
      }
    };
  }

  function fit(){
    // measure the flex container's content box (.pair sits inside .wrap padding)
    var w=document.getElementById('pair').clientWidth;
    // two backs sit side by side in the second row — scale to fit two across,
    // with a little slack so an exact fit never wraps the second card below
    var per = w>=700 ? (w-34-14)/2 : w;
    document.documentElement.style.setProperty('--s', Math.min(per/1004, 0.62));
  }

  var model=null;
  try{ var raw=localStorage.getItem(KEY); if(raw) model=JSON.parse(raw); }catch(e){}
  if(!model) model=defaults(); // no saved layout yet — show the standard card
  var pair=document.getElementById('pair');
  var dark = model.backs.obsidian || model.backs[model.backSel];
  var light = model.backs.cream || model.backs[model.backSel];
  pair.innerHTML =
    '<div class="prow">' + block('Лице', model.front) + '</div>' +
    '<div class="prow">' + block('Зворот — темний', dark) + block('Зворот — світлий', light) + '</div>';
  fit(); window.addEventListener('resize', fit);
  document.getElementById('print').addEventListener('click',function(){ window.print(); });
})();
</script>
</body>
</html>
