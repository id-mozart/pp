<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Конструктор візитки · Pan&amp;Partners</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#120C07; --pane:#1B140D; --line:rgba(197,120,40,.22); --ink:#F5EEE1; --muted:#B2A184; --gold:#E2A638; --gold-soft:#EFBE6A; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; }
  .app{ display:grid; grid-template-columns:1fr 320px; grid-template-rows:auto 1fr; height:100vh; }
  /* top bar */
  .top{ grid-column:1/3; display:flex; align-items:center; gap:14px; padding:12px 18px; border-bottom:1px solid var(--line); background:var(--pane); flex-wrap:wrap; }
  .top .brand{ font-family:'Spectral',serif; font-weight:600; font-size:19px; }
  .top .brand span{ color:var(--gold); }
  .top .sp{ flex:1; }
  .seg{ display:flex; gap:2px; background:#241a12; border:1px solid var(--line); border-radius:9px; padding:3px; }
  .seg button{ font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); background:none; border:0; border-radius:6px; padding:7px 14px; cursor:pointer; }
  .seg button.on{ background:var(--gold); color:#241a12; }
  .btn{ font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:.06em; color:var(--muted); background:none; border:1px solid var(--line); border-radius:8px; padding:8px 14px; cursor:pointer; transition:.15s; text-decoration:none; }
  .btn:hover{ color:var(--gold); border-color:var(--gold); }
  .btn.pri{ color:var(--gold); border-color:var(--gold); }
  /* stage */
  .stagewrap{ position:relative; overflow:auto; display:flex; align-items:center; justify-content:center; padding:40px; }
  .stage{ position:relative; box-shadow:0 30px 80px rgba(0,0,0,.55); border-radius:16px; }
  .card{ position:relative; width:1004px; height:650px; overflow:hidden; border-radius:16px; }
  /* elements */
  .el{ position:absolute; cursor:grab; user-select:none; }
  .el.sel{ outline:1.5px solid var(--gold); outline-offset:3px; }
  .el.editing{ cursor:text; }
  .el[data-type="text"], .el[data-type="contact"]{ white-space:nowrap; }
  .el[data-type="contact"]{ display:flex; align-items:center; gap:20px; }
  .el[data-type="contact"] svg{ flex:none; }
  .el .h{ position:absolute; right:-7px; bottom:-7px; width:14px; height:14px; border:2px solid var(--gold); background:#241a12; border-radius:50%; cursor:nwse-resize; display:none; }
  .el.sel .h{ display:block; }
  /* right panel */
  .panel{ border-left:1px solid var(--line); background:var(--pane); overflow-y:auto; padding:18px; }
  .panel h3{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold-soft); margin:0 0 14px; }
  .row{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .row label{ font-size:12px; color:var(--muted); width:92px; flex:none; }
  .row input[type=number], .row input[type=text], .row select{ flex:1; min-width:0; background:#241a12; border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:7px 9px; font-family:'JetBrains Mono',monospace; font-size:13px; }
  .row input[type=color]{ width:38px; height:32px; background:none; border:1px solid var(--line); border-radius:7px; padding:2px; cursor:pointer; }
  .row.two{ gap:8px; }
  .stepper{ display:flex; align-items:center; gap:6px; flex:1; }
  .stepper button{ width:30px; height:32px; background:#241a12; border:1px solid var(--line); color:var(--ink); border-radius:7px; cursor:pointer; font-size:16px; }
  .stepper input{ flex:1; text-align:center; }
  .empty{ color:var(--muted); font-size:13px; line-height:1.6; }
  .chk{ display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:12px; cursor:pointer; }
  .danger{ color:#E08A5A; border-color:rgba(224,138,90,.4); }
  .danger:hover{ color:#E08A5A; border-color:#E08A5A; }
  .hint{ font-size:11.5px; color:#7A6A50; line-height:1.6; margin-top:10px; font-family:'JetBrains Mono',monospace; }
  .addrow{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  /* print: only the card at real size */
  @media print{
    @page{ size:1004px 650px; margin:0; }
    .top,.panel,.el .h{ display:none !important; }
    .app{ display:block; }
    .stagewrap{ padding:0; }
    .stage{ box-shadow:none; border-radius:0; }
    .card{ border-radius:0; }
    .el.sel{ outline:none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand">Pan<span>&amp;</span>Partners · конструктор</div>
    <div class="seg" id="side">
      <button data-side="front" class="on">Лице</button>
      <button data-side="back">Зворот</button>
    </div>
    <select id="backsel" style="display:none;background:#241a12;border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;cursor:pointer;">
      <option value="obsidian">Обсидіан</option>
      <option value="cream">Кремовий</option>
      <option value="amber">Амбер-панель</option>
    </select>
    <div class="sp"></div>
    <button class="btn" id="add">+ Текст</button>
    <button class="btn" id="restore" title="Повернути видалені стандартні елементи (напр. підпис)">Відновити</button>
    <a class="btn" href="/talk/vizytky/preview.html" target="_blank">Превʼю</a>
    <button class="btn" id="reset">Скинути</button>
    <button class="btn" id="save">Зберегти</button>
    <a class="btn" href="/talk/vizytky/">Галерея</a>
    <button class="btn pri" id="print">Друк / PDF</button>
  </div>

  <div class="stagewrap" id="stagewrap">
    <div class="stage"><div class="card" id="card"></div></div>
  </div>

  <div class="panel" id="panel"></div>
</div>

<script>
/* ============================ Pan&Partners card constructor ============================
   Vanilla WYSIWYG: click to select, drag to move, corner handle to resize,
   double-click text to edit, right panel for precise numbers. Layout persists to
   localStorage; Друк prints the card alone at real 85×55 mm. */
(function(){
  var CARD_W=1004, CARD_H=650;
  var ICONS={
    phone:'<path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233a14 14 0 0 0 6.392 6.384"/>',
    mail:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
    globe:'<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>'
  };
  function icon(kind,sz,color){ return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+ICONS[kind]+'</svg>'; }
  var FONTS={ serif:"'Spectral',serif", mono:"'JetBrains Mono',monospace", sans:"'Inter',sans-serif" };

  function defaults(){
    return {
      front:{
        bg:'linear-gradient(157deg,#F7F1E6 0%,#F1E7D4 100%)',
        els:[
          {id:'logo', type:'image', src:'/talk/vizytky/assets/pan-partners-dark.svg', x:80, y:58, w:330},
          {id:'dir',  type:'text', text:'Консалтинг · Продажі · Переговори', x:544, y:68, size:18, font:'mono', color:'#6E5A3C', weight:500, track:.12, upper:true, align:'right'},
          {id:'name', type:'text', text:'Тетяна Пан', x:75, y:198, size:96, font:'serif', color:'#2A1D10', weight:500, track:0, upper:false, align:'left'},
          {id:'roles',type:'text', text:'Бізнес-тренерка · коуч · менторка', x:80, y:312, size:20, font:'mono', color:'#A85D0F', weight:600, track:.05, upper:true, align:'left'},
          {id:'line', type:'line', x:80, y:392, w:360, h:2},
          {id:'phone',type:'contact', kind:'phone', text:'+380 50 448-14-11', x:80, y:452, size:28, color:'#2A1D10'},
          {id:'mail', type:'contact', kind:'mail',  text:'t.pan@pan-partners.agency', x:80, y:506, size:28, color:'#2A1D10'},
          {id:'site', type:'contact', kind:'globe', text:'pan-partners.agency', x:80, y:560, size:28, color:'#2A1D10'},
          {id:'qr',   type:'image', src:'/talk/vizytky/assets/qr-fancy.svg', x:742, y:392, w:206}
        ]
      },
      backSel:'obsidian',
      backs:{
        obsidian:{ bg:'radial-gradient(135% 150% at 50% 40%, #1E1509 0%, #17100B 60%, #130C06 100%)', els:[
          {id:'amp', type:'image', src:'/talk/vizytky/assets/amp-amber.svg', x:392, y:210, w:260}
        ]},
        cream:{ bg:'linear-gradient(157deg,#F7F1E6 0%,#F1E7D4 100%)', els:[
          {id:'amp', type:'image', src:'/talk/vizytky/assets/amp-amber.svg', x:392, y:210, w:260}
        ]},
        amber:{ bg:'linear-gradient(152deg,#F0D08A 0%,#EFBE6A 26%,#E2A638 60%,#C6791C 100%)', els:[
          {id:'amp', type:'image', src:'/talk/vizytky/assets/amp-ink.svg', x:392, y:210, w:260}
        ]}
      }
    };
  }

  var KEY='pp-vizytka-constructor-v6';
  var model, side='front', selId=null, dragging=null;

  function load(){
    try{ var raw=localStorage.getItem(KEY); if(raw){ model=JSON.parse(raw); return; } }catch(e){}
    model=defaults();
    try{ localStorage.setItem(KEY, JSON.stringify(model)); }catch(e){} // seed so Превʼю has a layout
  }
  function persist(){ try{ localStorage.setItem(KEY, JSON.stringify(model)); }catch(e){} }

  var card=document.getElementById('card');
  var panel=document.getElementById('panel');

  function cur(){ return side==='front' ? model.front : model.backs[model.backSel]; }
  function el(id){ return cur().els.filter(function(e){return e.id===id;})[0]; }
  /* keep every element at least partly on the card so nothing can be lost off-screen */
  function clampEl(e){
    e.x = Math.max(-260, Math.min(CARD_W-40, Math.round(e.x)));
    e.y = Math.max(-24, Math.min(CARD_H-30, Math.round(e.y)));
  }
  /* re-add any standard element the user deleted, from the current defaults, without touching what's there */
  function restoreMissing(){
    var def = side==='front' ? defaults().front : defaults().backs[model.backSel];
    var have={}; cur().els.forEach(function(e){ have[e.id]=1; });
    var added=0;
    def.els.forEach(function(de){ if(!have[de.id]){ cur().els.push(JSON.parse(JSON.stringify(de))); added++; } });
    // also pull any off-screen elements back into view
    cur().els.forEach(clampEl);
    render(); persist(); return added;
  }

  function styleText(e){
    return 'font-family:'+FONTS[e.font]+';font-size:'+e.size+'px;font-weight:'+e.weight+';letter-spacing:'+e.track+'em;'+
           (e.upper?'text-transform:uppercase;':'')+'color:'+e.color+';text-align:'+e.align+';line-height:1.05;';
  }

  function render(){
    card.style.background=cur().bg;
    card.innerHTML='';
    cur().els.forEach(function(e){
      var d=document.createElement('div');
      d.className='el'+(e.id===selId?' sel':''); d.dataset.id=e.id; d.dataset.type=e.type;
      d.style.left=e.x+'px'; d.style.top=e.y+'px';
      if(e.type==='text'){ d.style.cssText+= ';left:'+e.x+'px;top:'+e.y+'px;'+styleText(e); d.textContent=e.text; }
      else if(e.type==='contact'){ d.style.cssText+=';left:'+e.x+'px;top:'+e.y+'px;';
        d.innerHTML=icon(e.kind, Math.round(e.size*0.86), '#C6791C')+'<span style="font-family:'+FONTS.mono+';font-size:'+e.size+'px;letter-spacing:.02em;color:'+e.color+';">'+esc(e.text)+'</span>'; }
      else if(e.type==='image'){ d.innerHTML='<img src="'+e.src+'" style="display:block;width:'+e.w+'px;height:auto;pointer-events:none;">'; }
      else if(e.type==='line'){ d.innerHTML='<div style="width:'+e.w+'px;height:'+e.h+'px;background:linear-gradient(90deg,#C6791C,rgba(198,121,28,0));"></div>'; }
      var h=document.createElement('div'); h.className='h'; h.dataset.handle='1'; d.appendChild(h);
      card.appendChild(d);
    });
    drawPanel();
  }
  function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

  /* ---------- selection / drag / resize ---------- */
  function scale(){ return card.getBoundingClientRect().width / CARD_W; }
  card.addEventListener('pointerdown', function(ev){
    var target=ev.target.closest('.el'); if(!target) return;
    var e=el(target.dataset.id); if(!e) return;
    if(target.classList.contains('editing')) return;
    selId=e.id; render();
    var isHandle=ev.target.dataset.handle==='1';
    var s=scale();
    dragging={ e:e, mode:isHandle?'resize':'move', sx:ev.clientX, sy:ev.clientY, ox:e.x, oy:e.y, ow:(e.w||0), osize:(e.size||0) };
    card.setPointerCapture(ev.pointerId); ev.preventDefault();
  });
  card.addEventListener('pointermove', function(ev){
    if(!dragging) return;
    var s=scale(), dx=(ev.clientX-dragging.sx)/s, dy=(ev.clientY-dragging.sy)/s, e=dragging.e;
    if(dragging.mode==='move'){ e.x=Math.round(dragging.ox+dx); e.y=Math.round(dragging.oy+dy); clampEl(e); }
    else { // resize: images by width, text/contact by size
      if(e.type==='image'||e.type==='line'){ e.w=Math.max(20, Math.round(dragging.ow+dx)); }
      else { e.size=Math.max(6, Math.round(dragging.osize+dy*0.5)); }
    }
    render();
  });
  card.addEventListener('pointerup', function(ev){ if(dragging){ dragging=null; persist(); } });

  /* double-click to edit text */
  card.addEventListener('dblclick', function(ev){
    var target=ev.target.closest('.el'); if(!target) return;
    var e=el(target.dataset.id); if(!e||(e.type!=='text'&&e.type!=='contact')) return;
    var node = e.type==='text' ? target : target.querySelector('span');
    node.contentEditable='true'; target.classList.add('editing'); node.focus();
    var r=document.createRange(); r.selectNodeContents(node); var s=getSelection(); s.removeAllRanges(); s.addRange(r);
    function done(){ e.text=node.textContent.trim(); node.contentEditable='false'; target.classList.remove('editing'); persist(); render(); node.removeEventListener('blur',done); }
    node.addEventListener('blur',done);
    node.addEventListener('keydown',function(k){ if(k.key==='Enter'&&!k.shiftKey){ k.preventDefault(); node.blur(); } });
    ev.stopPropagation();
  });

  /* keyboard nudge + delete */
  document.addEventListener('keydown', function(k){
    if(!selId) return; var e=el(selId); if(!e) return;
    if(document.querySelector('.el.editing')) return;
    var step=k.shiftKey?10:1;
    if(k.key==='ArrowLeft'){ e.x-=step; } else if(k.key==='ArrowRight'){ e.x+=step; }
    else if(k.key==='ArrowUp'){ e.y-=step; } else if(k.key==='ArrowDown'){ e.y+=step; }
    else if((k.key==='Delete'||k.key==='Backspace') && !/^(name|logo)$/.test(e.id)){ removeEl(e.id); return; }
    else return;
    k.preventDefault(); render(); persist();
  });

  card.addEventListener('pointerdown', function(ev){ if(ev.target===card){ selId=null; render(); } });

  /* ---------- right panel ---------- */
  function fld(label, input){ var r=document.createElement('div'); r.className='row'; var l=document.createElement('label'); l.textContent=label; r.appendChild(l); r.appendChild(input); return r; }
  function num(val, on){ var i=document.createElement('input'); i.type='number'; i.value=val; i.addEventListener('input',function(){ on(parseFloat(i.value)||0); }); return i; }
  function stepper(val, on){ var w=document.createElement('div'); w.className='stepper';
    var m=document.createElement('button'); m.textContent='−'; var i=document.createElement('input'); i.type='number'; i.value=val; var p=document.createElement('button'); p.textContent='+';
    function set(v){ i.value=v; on(v); }
    m.onclick=function(){ set((parseFloat(i.value)||0)-1); }; p.onclick=function(){ set((parseFloat(i.value)||0)+1); };
    i.addEventListener('input',function(){ on(parseFloat(i.value)||0); });
    w.appendChild(m); w.appendChild(i); w.appendChild(p); return w; }

  function drawPanel(){
    panel.innerHTML='';
    if(!selId){ panel.innerHTML='<h3>Елемент</h3><div class="empty">Клікніть елемент, щоб вибрати.<br><br>• тягніть — перемістити<br>• кутовий кружок — розмір<br>• подвійний клік — редагувати текст<br>• стрілки — зсув на 1px (Shift — 10px)<br>• Delete — прибрати</div>'; return; }
    var e=el(selId);
    var h=document.createElement('h3'); h.textContent=titleOf(e); panel.appendChild(h);
    // position
    panel.appendChild(fld('X', num(e.x,function(v){ e.x=Math.round(v); clampEl(e); render(); persist(); })));
    panel.appendChild(fld('Y', num(e.y,function(v){ e.y=Math.round(v); clampEl(e); render(); persist(); })));
    if(e.type==='image'||e.type==='line'){
      panel.appendChild(fld('Ширина', stepper(e.w,function(v){ e.w=Math.max(10,Math.round(v)); render(); persist(); })));
    }
    if(e.type==='text'||e.type==='contact'){
      panel.appendChild(fld('Розмір', stepper(e.size,function(v){ e.size=Math.max(6,Math.round(v)); render(); persist(); })));
      var ci=document.createElement('input'); ci.type='color'; ci.value=e.color; ci.addEventListener('input',function(){ e.color=ci.value; render(); persist(); });
      panel.appendChild(fld('Колір', ci));
    }
    if(e.type==='text'){
      // font
      var fs=document.createElement('select'); [['serif','Spectral'],['mono','Mono'],['sans','Inter']].forEach(function(o){ var op=document.createElement('option'); op.value=o[0]; op.textContent=o[1]; if(e.font===o[0])op.selected=true; fs.appendChild(op); }); fs.addEventListener('change',function(){ e.font=fs.value; render(); persist(); });
      panel.appendChild(fld('Шрифт', fs));
      var ws=document.createElement('select'); [400,500,600].forEach(function(w){ var op=document.createElement('option'); op.value=w; op.textContent=w; if(+e.weight===w)op.selected=true; ws.appendChild(op); }); ws.addEventListener('change',function(){ e.weight=+ws.value; render(); persist(); });
      panel.appendChild(fld('Насиченість', ws));
      panel.appendChild(fld('Трекінг', num(e.track,function(v){ e.track=v; render(); persist(); })));
      var as=document.createElement('select'); [['left','вліво'],['center','центр'],['right','вправо']].forEach(function(o){ var op=document.createElement('option'); op.value=o[0]; op.textContent=o[1]; if(e.align===o[0])op.selected=true; as.appendChild(op); }); as.addEventListener('change',function(){ e.align=as.value; render(); persist(); });
      panel.appendChild(fld('Вирівн.', as));
      var up=document.createElement('label'); up.className='chk'; var cb=document.createElement('input'); cb.type='checkbox'; cb.checked=!!e.upper; cb.addEventListener('change',function(){ e.upper=cb.checked; render(); persist(); }); up.appendChild(cb); up.appendChild(document.createTextNode('ВЕРХНІЙ РЕГІСТР')); panel.appendChild(up);
    }
    if(e.type!=='image' && e.type!=='line' && !/^(name)$/.test(e.id)){
      // allow delete for most
    }
    if(!/^(name|logo|blogo)$/.test(e.id)){
      var del=document.createElement('button'); del.className='btn danger'; del.style.width='100%'; del.style.marginTop='6px'; del.textContent='Прибрати елемент'; del.onclick=function(){ removeEl(e.id); }; panel.appendChild(del);
    }
    var hint=document.createElement('div'); hint.className='hint'; hint.textContent='Подвійний клік по тексту — редагувати. Стрілки — зсув.'; panel.appendChild(hint);
  }
  function titleOf(e){ return ({logo:'Логотип',blogo:'Логотип',amp:'Амперсанд',bwm:'Напис лого',dir:'Напрям (кут)',name:"Ім'я",roles:'Підпис (ролі)',line:'Лінія',bline:'Лінія',phone:'Телефон',mail:'E-mail',site:'Сайт',qr:'QR-код',btag:'Підпис звороту'})[e.id] || 'Текст'; }

  function removeEl(id){ cur().els=cur().els.filter(function(x){return x.id!==id;}); selId=null; render(); persist(); }

  /* ---------- toolbar ---------- */
  var backsel=document.getElementById('backsel');
  function syncBackSel(){ backsel.style.display = side==='back' ? '' : 'none'; backsel.value=model.backSel; }
  document.getElementById('side').addEventListener('click',function(ev){ var b=ev.target.closest('button'); if(!b)return; side=b.dataset.side; selId=null; [].forEach.call(this.children,function(x){x.classList.toggle('on',x===b);}); syncBackSel(); render(); });
  backsel.addEventListener('change',function(){ model.backSel=backsel.value; selId=null; render(); persist(); });
  document.getElementById('add').addEventListener('click',function(){ var id='t'+Date.now(); cur().els.push({id:id,type:'text',text:'Новий текст',x:120,y:120,size:26,font:'sans',color: side==='back'?'#F5EEE1':'#2A1D10',weight:400,track:0,upper:false,align:'left'}); selId=id; render(); persist(); });
  document.getElementById('restore').addEventListener('click',function(){ var n=restoreMissing(); this.textContent = n? ('Повернуто: '+n) : 'Все на місці'; var b=this; setTimeout(function(){ b.textContent='Відновити'; },1400); });
  document.getElementById('reset').addEventListener('click',function(){ if(confirm('Скинути макет до типового?')){ model=defaults(); selId=null; render(); persist(); } });
  document.getElementById('save').addEventListener('click',function(){ persist(); var b=this; var t=b.textContent; b.textContent='Збережено ✓'; setTimeout(function(){ b.textContent=t; },1200); });
  document.getElementById('print').addEventListener('click',function(){ var wasSel=selId; selId=null; render(); setTimeout(function(){ window.print(); selId=wasSel; render(); }, 60); });

  /* fit the stage to the viewport */
  function fit(){
    var wrap=document.getElementById('stagewrap');
    var avail=Math.min(wrap.clientWidth-80, 1004);
    var sc=Math.min(avail/CARD_W, (wrap.clientHeight-80)/CARD_H, 1);
    document.querySelector('.stage').style.transform='scale('+sc+')';
    document.querySelector('.stage').style.transformOrigin='center';
  }
  window.addEventListener('resize', fit);

  load();
  // optional deep-link: ?side=back&v=mono — preselect a side / back variant
  (function(){ var q=new URLSearchParams(location.search);
    if(q.get('side')==='back'){ side='back'; document.querySelector('[data-side="back"]').classList.add('on'); document.querySelector('[data-side="front"]').classList.remove('on'); }
    var v=q.get('v'); if(v && model.backs[v]) model.backSel=v;
  })();
  syncBackSel(); render(); fit();
})();
</script>
</body>
</html>
